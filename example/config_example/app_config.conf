# =====================================================
# j2_library 전역 설정 파일 (snake_case 적용)
# =====================================================

# [애플리케이션 기본 정보]
app.name = "제이투 모니터링 시스템"
app.version = 1.0.5
app.description = "시스템 리소스를 실시간으로 \"안전하게\" 관리합니다."

# [네트워크 설정]
network.server_ip = 127.0.0.1
network.port = 9000
network.timeout = 60
network.use_ssl = true

# [리소스 모니터 임계치]
monitor.cpu_limit = 85.5
monitor.mem_limit = 90
monitor.disk_path = "C:\\"

# [로그 설정]
log.level = 1
log.file_path = "./logs/j2_system.log"
